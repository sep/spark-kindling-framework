[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "spark-kindling-cli"
version = "0.9.0"
description = "Command-line tooling for Kindling"
authors = ["SEP Engineering <engineering@sep.com>"]
license = "MIT"
readme = "README.md"
packages = [
    {include = "kindling_cli", from = "."}
]

[tool.poetry.dependencies]
python = "^3.10"
click = ">=8.1.0"
jinja2 = ">=3.1.0"
pyyaml = ">=6.0"
requests = {version = ">=2.31.0", optional = true}
azure-identity = {version = ">=1.15.0", optional = true}
azure-storage-blob = {version = ">=12.14.0", optional = true}

[tool.poetry.extras]
deploy = ["requests", "azure-identity", "azure-storage-blob"]

[tool.poetry.scripts]
kindling = "kindling_cli.cli:main"
