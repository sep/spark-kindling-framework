[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "spark-kindling-ext-sdp"
version = "0.3.1"
description = "Spark Declarative Pipelines (SDP) declaration engine for Kindling"
authors = ["SEP Engineering <engineering@sep.com>"]
license = "MIT"
readme = "README.md"
packages = [
    {include = "kindling_ext_sdp"},
]

[tool.poetry.dependencies]
python = "^3.10"
# Phase 1 is a pure-metadata declaration layer: it consumes the Kindling
# registries (kindling.data_entities / kindling.data_pipes) and produces a
# validated DeclarationPlan. It deliberately has NO dependency on
# pyspark.pipelines — the Spark 4.1+ `pyspark[pipelines]` extra becomes a
# dependency only in Phase 2, when a concrete engine emits declarations.
spark-kindling = ">=0.10.0"

[tool.poetry.group.dev.dependencies]
pytest = ">=7.0.0"
black = ">=23.0.0"
