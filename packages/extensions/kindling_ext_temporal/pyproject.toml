[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "kindling-ext-temporal"
version = "0.1.0"
description = "Temporal event, condition, and episode primitives for Kindling"
authors = ["SEP Engineering <engineering@sep.com>"]
license = "MIT"
readme = "README.md"
packages = [
    {include = "kindling_ext_temporal"},
]

[tool.poetry.dependencies]
python = "^3.10"
# kindling and Spark are provided by the target runtime.

[tool.poetry.group.dev.dependencies]
pytest = ">=7.0.0"
black = ">=23.0.0"
