[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "kindling-otel-azure"
version = "0.4.0"
description = "Azure Monitor OpenTelemetry integration for Kindling framework"
authors = ["SEP Engineering <engineering@sep.com>"]
license = "MIT"
readme = "README.md"
packages = [
    {include = "kindling_otel_azure"},
]
include = [
    "CHANGELOG.md",
]

[tool.poetry.dependencies]
python = "^3.10"
# kindling is provided by the runtime environment, not installed as a dependency.
# `azure-core` is intentionally constrained to 1.30.x for managed-runtime
# compatibility (for example, Fabric runtime 1.30.2).
azure-core = ">=1.30.0,<1.31.0"
# typing-extensions pinned high because the Databricks runtime ships an older
# version and the `deprecated` decorator (used by opentelemetry) needs >=4.6.
typing-extensions = ">=4.6.0"
# OpenTelemetry + Azure Monitor deps live under extras: Fabric requires the
# 1.6.x / 1.20.x line for azure-core 1.30.x compatibility; Synapse and
# Databricks can run the newer 1.8.x / 1.21.x line. Pre-rename this lived
# across three separate wheels (`kindling_otel_azure_{fabric,synapse,databricks}`)
# generated by scripts/generate_extension_config.py. Collapsed into extras
# to match the spark-kindling rename pattern.
azure-monitor-opentelemetry = [
    {version = ">=1.6.0,<1.7.0", optional = true, markers = "extra == 'fabric'"},
    {version = "^1.8.0",         optional = true, markers = "extra == 'synapse' or extra == 'databricks'"},
]
opentelemetry-api = [
    {version = "^1.20.0", optional = true, markers = "extra == 'fabric'"},
    {version = "^1.21.0", optional = true, markers = "extra == 'synapse' or extra == 'databricks'"},
]
opentelemetry-sdk = [
    {version = "^1.20.0", optional = true, markers = "extra == 'fabric'"},
    {version = "^1.21.0", optional = true, markers = "extra == 'synapse' or extra == 'databricks'"},
]

[tool.poetry.extras]
# Install with:
#   pip install 'kindling-otel-azure[fabric]'        # Fabric runtime 1.30.x
#   pip install 'kindling-otel-azure[synapse]'       # Synapse + newer azure-core
#   pip install 'kindling-otel-azure[databricks]'    # Databricks + newer azure-core
fabric = ["azure-monitor-opentelemetry", "opentelemetry-api", "opentelemetry-sdk"]
synapse = ["azure-monitor-opentelemetry", "opentelemetry-api", "opentelemetry-sdk"]
databricks = ["azure-monitor-opentelemetry", "opentelemetry-api", "opentelemetry-sdk"]

[tool.poetry.group.dev.dependencies]
pytest = ">=7.0.0"
black = ">=23.0.0"
# Dev env pulls in one platform's dep set to exercise the code during testing.
# Databricks profile chosen because it's also Unity Catalog / newer runtime —
# the more-modern version line.
azure-monitor-opentelemetry = "^1.8.0"
opentelemetry-api = "^1.21.0"
opentelemetry-sdk = "^1.21.0"
