services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/kindling:cached
      - spark-warehouse:/spark-warehouse
    command: sleep infinity
    environment:
      - PYTHONPATH=/workspaces/kindling
      - SPARK_LOCAL_IP=127.0.0.1

volumes:
  spark-warehouse:
