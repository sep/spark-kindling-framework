services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/kindling:cached
      - spark-warehouse:/spark-warehouse
      - kindling-domain:/home/vscode/kindling-domain
      - claude-state:/home/vscode/.claude
      - codex-state:/home/vscode/.codex
      - gh-config:/home/vscode/.config/gh
    command: sleep infinity
    environment:
      - PYTHONPATH=/workspaces/kindling
      - SPARK_LOCAL_IP=127.0.0.1

volumes:
  spark-warehouse:
  claude-state:
  codex-state:
  gh-config:
  kindling-domain:
