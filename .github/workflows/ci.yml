name: Kindling CI/CD Pipeline

# Workflow triggers and test strategy:
#
# ON EVERY COMMIT (push or PR):
# - Unit tests: Always run (fast feedback)
# - Integration tests: Always run (validates framework integration)
# - Code quality checks: Always run (linting, formatting, security)
# - Wheel builds: Only if source code changes or [build wheels] in commit message
#
# ON TAG PUSH (v*) — release flow:
# - Changes since the previous version tag are classified as runtime, CLI, SDK,
#   or docs/proposal-only.
# - Runtime releases run full artifact deploy + cloud system tests.
# - CLI/SDK releases build and publish wheels after unit/integration/security
#   gates, but skip cloud system tests.
# - Docs/proposal-only tags publish release notes only.
# - If required gates pass: GitHub release is CREATED atomically.
# - Release is never visible to the public until wheels are ready
#
# To release: push a v* tag (poe release). CI owns the GitHub release object.
# To force wheel rebuild on any commit, include [build wheels] in commit message
# To skip cloud system tests for a standalone-only fix, include [skip system tests] in commit message

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual triggering
    inputs:
      system_test_platform:
        description: "System test platform to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - fabric
          - synapse
          - databricks
      system_test_workers:
        description: "Override xdist workers for system tests (blank uses platform defaults)"
        required: false
        default: ""
        type: string
      system_test_poll_interval:
        description: "Override system test poll interval in seconds"
        required: false
        default: ""
        type: string
      system_test_stream_max_wait:
        description: "Override stdout stream max wait in seconds"
        required: false
        default: ""
        type: string
      system_test_completion_timeout:
        description: "Override direct status polling timeout in seconds"
        required: false
        default: ""
        type: string
      publish_devcontainer:
        description: "Build and publish the domain devcontainer image to GHCR"
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ci

defaults:
  run:
    shell: bash

jobs:
  classify-changes:
    name: Classify Changes
    runs-on: ubuntu-latest
    outputs:
      release_kind: ${{ steps.classify.outputs.release_kind }}
      runtime_changed: ${{ steps.classify.outputs.runtime_changed }}
      cli_changed: ${{ steps.classify.outputs.cli_changed }}
      sdk_changed: ${{ steps.classify.outputs.sdk_changed }}
      docs_only: ${{ steps.classify.outputs.docs_only }}
      needs_wheels: ${{ steps.classify.outputs.needs_wheels }}
      needs_system_tests: ${{ steps.classify.outputs.needs_system_tests }}
      changed_files: ${{ steps.classify.outputs.changed_files }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        run: |
          set -euo pipefail

          is_tag=false
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            is_tag=true
            current_tag="${{ github.ref_name }}"
            previous_tag=$(git tag --sort=-v:refname --list 'v[0-9]*' | grep -v "^${current_tag}$" | head -1 || true)
            if [ -n "$previous_tag" ]; then
              range="${previous_tag}..HEAD"
            else
              range="$(git rev-list --max-parents=0 HEAD)..HEAD"
            fi
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            range="origin/${{ github.base_ref }}...HEAD"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            range="HEAD~1..HEAD"
          else
            before="${{ github.event.before }}"
            if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]]; then
              range="${before}..HEAD"
            else
              range="HEAD~1..HEAD"
            fi
          fi

          echo "Classifying range: $range"
          changed_files=$(git diff --name-only "$range" || true)
          printf '%s\n' "$changed_files"

          runtime_changed=false
          cli_changed=false
          sdk_changed=false
          docs_changed=false
          other_changed=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            case "$file" in
              CHANGELOG.md)
                docs_changed=true
                ;;
              pyproject.toml|poetry.lock)
                if [[ "$is_tag" == "true" ]]; then
                  # Version bumps and lockfile churn are release metadata on tag
                  # ranges. Source changes in the same range choose the gates.
                  :
                else
                  runtime_changed=true
                fi
                ;;
              packages/kindling_cli/pyproject.toml)
                if [[ "$is_tag" == "true" ]]; then
                  :
                else
                  cli_changed=true
                fi
                ;;
              packages/kindling_sdk/pyproject.toml)
                if [[ "$is_tag" == "true" ]]; then
                  :
                else
                  sdk_changed=true
                fi
                ;;
              packages/kindling/*|runtime/*|scripts/build.py|scripts/build_platform_wheels.sh|scripts/deploy.py|build-configs/*|tests/system/*)
                runtime_changed=true
                ;;
              packages/kindling_cli/*)
                cli_changed=true
                ;;
              packages/kindling_sdk/*)
                sdk_changed=true
                ;;
              docs/*|README.md|AGENTS.md|CLAUDE.md|.github/instructions/*|.github/kindling-agent-reference.md)
                docs_changed=true
                ;;
              .github/workflows/*|.github/Dockerfile.*|scripts/release.sh)
                runtime_changed=true
                ;;
              *)
                other_changed=true
                ;;
            esac
          done <<< "$changed_files"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            runtime_changed=true
          fi

          needs_wheels=false
          needs_system_tests=false
          release_kind="docs"

          if [[ "$runtime_changed" == "true" || "$other_changed" == "true" ]]; then
            release_kind="runtime"
            needs_wheels=true
            needs_system_tests=true
          elif [[ "$cli_changed" == "true" && "$sdk_changed" == "true" ]]; then
            release_kind="cli-sdk"
            needs_wheels=true
          elif [[ "$cli_changed" == "true" ]]; then
            release_kind="cli"
            needs_wheels=true
          elif [[ "$sdk_changed" == "true" ]]; then
            release_kind="sdk"
            needs_wheels=true
          fi

          # [skip system tests] in the commit message bypasses cloud platform
          # tests for runtime changes that only affect the standalone/local path.
          commit_msg="${{ github.event.head_commit.message }}"
          if [[ "$needs_system_tests" == "true" && "$commit_msg" == *"[skip system tests]"* ]]; then
            needs_system_tests=false
            echo "Commit message contains [skip system tests] - skipping cloud system tests"
          fi

          docs_only=false
          if [[ "$needs_wheels" == "false" && "$docs_changed" == "true" ]]; then
            docs_only=true
          fi

          {
            echo "release_kind=$release_kind"
            echo "runtime_changed=$runtime_changed"
            echo "cli_changed=$cli_changed"
            echo "sdk_changed=$sdk_changed"
            echo "docs_only=$docs_only"
            echo "needs_wheels=$needs_wheels"
            echo "needs_system_tests=$needs_system_tests"
            echo "changed_files<<EOF"
            printf '%s\n' "$changed_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Release kind: $release_kind"
          echo "Needs wheels: $needs_wheels"
          echo "Needs system tests: $needs_system_tests"

  build-ci-image:
    name: Build CI Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image-name.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image-name
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "Building image: $IMAGE"

      - name: Build and push CI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/Dockerfile.ci
          push: true
          tags: ${{ steps.image-name.outputs.image }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-ci-image
    container:
      image: ${{ needs.build-ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install project in editable mode
        run: pip install -e .

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}/packages:$PYTHONPATH
        run: |
          poe test-unit-ci

      - name: Create output directory for backwards compatibility
        run: mkdir -p output && cp -r htmlcov test-results/unit-test-results.xml output/ 2>/dev/null || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            test-results/
            htmlcov/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  lint-and-format:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-ci-image
    container:
      image: ${{ needs.build-ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Black formatter check
        run: black --check --diff packages/ tests/

      - name: Run pylint
        run: |
          mkdir -p output
          pylint packages/kindling/ --output-format=parseable --exit-zero > output/pylint-report.txt

      - name: Run mypy type checking
        run: mypy packages/kindling/ --html-report output/mypy-report || true

      - name: Upload code quality reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-quality-reports
          path: output/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-ci-image, unit-tests, lint-and-format]
    container:
      image: ${{ needs.build-ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    # Run integration tests on every commit (push or PR)
    if: always() && !cancelled()

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install project in editable mode
        run: pip install -e .

      - name: Run integration tests
        env:
          PYTHONPATH: ${{ github.workspace }}/packages:$PYTHONPATH
          AZURE_STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT }}
          AZURE_CONTAINER: ${{ vars.AZURE_CONTAINER }}
          AZURE_BASE_PATH: ci-tests/${{ github.run_id }}
        run: |
          poe test-integration-ci

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: test-results/integration-test-results.xml

  kda-packaging-tests:
    name: KDA Packaging Tests
    runs-on: ubuntu-latest
    needs: [build-ci-image, unit-tests]
    container:
      image: ${{ needs.build-ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install project in editable mode
        run: pip install -e .

      - name: Run KDA packaging tests
        env:
          PYTHONPATH: ${{ github.workspace }}/packages:$PYTHONPATH
        run: |
          mkdir -p test-results
          python tests/test_kda_packaging.py

      - name: Run simple KDA workflow test
        env:
          PYTHONPATH: ${{ github.workspace }}/packages:$PYTHONPATH
        run: |
          python tests/integration/test_kda_packaging.py

      - name: Upload KDA test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kda-test-results
          path: test-results/

  deploy-system-test-artifacts:
    name: Deploy System Test Artifacts
    runs-on: ubuntu-latest
    needs: [classify-changes, build-ci-image, build-wheels]
    container:
      image: ${{ needs.build-ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    if: |
      needs.classify-changes.outputs.needs_system_tests == 'true' &&
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    environment: testing
    outputs:
      azure_base_path: ${{ steps.base-path.outputs.azure_base_path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install project in editable mode
        if: |
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.system_test_platform == 'all' ||
          github.event.inputs.system_test_platform == matrix.platform
        run: pip install -e .

      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          name: platform-wheels
          path: dist/

      - name: Resolve candidate storage path
        id: base-path
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            base_path="release-candidates/${{ github.ref_name }}"
          else
            base_path="workflow-dispatch/${{ github.run_id }}"
          fi
          echo "azure_base_path=$base_path" >> "$GITHUB_OUTPUT"
          echo "Using AZURE_BASE_PATH=$base_path"

      - name: Deploy candidate wheels and bootstrap script
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT }}
          AZURE_CONTAINER: ${{ vars.AZURE_CONTAINER }}
          AZURE_BASE_PATH: ${{ steps.base-path.outputs.azure_base_path }}
        run: |
          python scripts/deploy.py

      - name: Create deployment summary
        run: |
          echo "# Staged System Test Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "AZURE_BASE_PATH: \`${{ steps.base-path.outputs.azure_base_path }}\`" >> $GITHUB_STEP_SUMMARY

  system-tests:
    name: System Tests (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs:
      [
        classify-changes,
        build-ci-image,
        integration-tests,
        kda-packaging-tests,
        deploy-system-test-artifacts,
      ]
    container:
      image: ${{ needs.build-ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    # Run system tests for tag pushes (releases) OR manual workflow dispatch
    if: |
      needs.classify-changes.outputs.needs_system_tests == 'true' &&
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    environment: testing

    strategy:
      matrix:
        include:
          - platform: synapse
            label: synapse
            artifact_suffix: synapse
          - platform: fabric
            label: fabric
            artifact_suffix: fabric
          - platform: databricks
            label: databricks-uc
            artifact_suffix: databricks-uc
            databricks_mode: uc
      fail-fast: false # Allow all platforms to run independently

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install project in editable mode
        run: pip install -e .

      - name: Resolve Databricks lane config
        if: |
          matrix.platform == 'databricks' &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.system_test_platform == 'all' ||
            github.event.inputs.system_test_platform == matrix.platform
          )
        env:
          DEFAULT_DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DEFAULT_DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID }}
          UC_VOLUME_CATALOG: ${{ vars.KINDLING_DATABRICKS_RUNTIME_VOLUME_CATALOG }}
          UC_VOLUME_SCHEMA: ${{ vars.KINDLING_DATABRICKS_RUNTIME_VOLUME_SCHEMA }}
          UC_TEMP_VOLUME: ${{ vars.KINDLING_DATABRICKS_RUNTIME_TEMP_VOLUME }}
        run: |
          echo "DATABRICKS_HOST=$DEFAULT_DATABRICKS_HOST" >> "$GITHUB_ENV"
          echo "DATABRICKS_CLUSTER_ID=$DEFAULT_DATABRICKS_CLUSTER_ID" >> "$GITHUB_ENV"
          echo "KINDLING_DATABRICKS_SYSTEM_TEST_MODE=uc" >> "$GITHUB_ENV"
          echo "KINDLING_DATABRICKS_RUNTIME_VOLUME_CATALOG=${UC_VOLUME_CATALOG:-kindling}" >> "$GITHUB_ENV"
          echo "KINDLING_DATABRICKS_RUNTIME_VOLUME_SCHEMA=${UC_VOLUME_SCHEMA:-kindling}" >> "$GITHUB_ENV"
          echo "KINDLING_DATABRICKS_RUNTIME_TEMP_VOLUME=${UC_TEMP_VOLUME:-artifacts}" >> "$GITHUB_ENV"
          echo "KINDLING_DATABRICKS_RUNTIME_TEMP_SUBDIR=ci-tests" >> "$GITHUB_ENV"

      - name: Run Databricks UC preflight
        if: |
          matrix.platform == 'databricks' &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.system_test_platform == 'all' ||
            github.event.inputs.system_test_platform == matrix.platform
          )
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT }}
          AZURE_CONTAINER: ${{ vars.AZURE_CONTAINER }}
        run: |
          python scripts/databricks_uc_preflight.py

      - name: Run system tests
        if: |
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.system_test_platform == 'all' ||
          github.event.inputs.system_test_platform == matrix.platform
        env:
          PYTHONPATH: ${{ github.workspace }}/packages:$PYTHONPATH
          # Platform-specific credentials
          FABRIC_WORKSPACE_ID: ${{ secrets.FABRIC_WORKSPACE_ID }}
          FABRIC_LAKEHOUSE_ID: ${{ secrets.FABRIC_LAKEHOUSE_ID }}
          CONFIG__platform_fabric__kindling__secrets__key_vault_url: ${{ secrets.CONFIG__platform_fabric__kindling__secrets__key_vault_url }}
          SYNAPSE_WORKSPACE_NAME: ${{ secrets.SYNAPSE_WORKSPACE_NAME }}
          SYNAPSE_SPARK_POOL_NAME: ${{ secrets.SYNAPSE_SPARK_POOL_NAME }}
          CONFIG__platform_synapse__kindling__secrets__key_vault_url: ${{ secrets.CONFIG__platform_synapse__kindling__secrets__key_vault_url }}
          # Azure authentication (shared) - using both AZURE_* and ARM_* for compatibility
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
          # Databricks SDK expects ARM_* environment variables for service principal auth
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # Storage configuration
          AZURE_STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT }}
          AZURE_CONTAINER: ${{ vars.AZURE_CONTAINER }}
          AZURE_BASE_PATH: ${{ needs.deploy-system-test-artifacts.outputs.azure_base_path }}
          # Event Hub system test resource
          EVENTHUB_TEST_RESOURCE_GROUP: ${{ secrets.EVENTHUB_TEST_RESOURCE_GROUP }}
          EVENTHUB_TEST_NAMESPACE: ${{ secrets.EVENTHUB_TEST_NAMESPACE }}
          EVENTHUB_TEST_NAME: ${{ secrets.EVENTHUB_TEST_NAME }}
          EVENTHUB_TEST_AUTH_RULE: ${{ secrets.EVENTHUB_TEST_AUTH_RULE }}
          EVENTHUB_TEST_CONSUMER_GROUP: ${{ secrets.EVENTHUB_TEST_CONSUMER_GROUP }}
          EVENTHUB_TEST_CONNECTION_STRING: ${{ secrets.EVENTHUB_TEST_CONNECTION_STRING }}
          KINDLING_SYSTEM_TEST_CI_WORKERS: ${{ github.event.inputs.system_test_workers }}
          KINDLING_SYSTEM_TEST_POLL_INTERVAL: ${{ github.event.inputs.system_test_poll_interval }}
          KINDLING_SYSTEM_TEST_STREAM_MAX_WAIT: ${{ github.event.inputs.system_test_stream_max_wait }}
          KINDLING_SYSTEM_TEST_COMPLETION_TIMEOUT: ${{ github.event.inputs.system_test_completion_timeout }}
        run: |
          poe test-system-ci --platform ${{ matrix.platform }}

      - name: Upload system test results
        uses: actions/upload-artifact@v4
        if: |
          always() &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.system_test_platform == 'all' ||
            github.event.inputs.system_test_platform == matrix.platform
          )
        with:
          name: system-test-results-${{ matrix.artifact_suffix }}
          path: test-results/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-ci-image, unit-tests]
    container:
      image: ${{ needs.build-ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install security tools
        run: pip install pip-audit bandit

      - name: Audit dependencies for known vulnerabilities
        continue-on-error: true  # report-only; CVEs in transitive deps don't block release
        run: |
          mkdir -p output
          pip-audit --format json -o output/pip-audit-report.json

      - name: Run bandit SAST analysis
        run: |
          bandit -r packages/ -ll -s B101,B102,B108,B113,B603 -f json -o output/bandit-report.json

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: output/

  build-wheels:
    name: Build Platform Wheels
    runs-on: ubuntu-latest
    needs: [classify-changes, build-ci-image, unit-tests, lint-and-format]
    container:
      image: ${{ needs.build-ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    # Build wheels for classified runtime/CLI/SDK releases, workflow dispatch,
    # explicit [build wheels] commits, or source changes on ordinary pushes.
    if: |
      needs.classify-changes.outputs.needs_wheels == 'true' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[build wheels]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2 # Need previous commit for comparison

      - name: Check if wheel rebuild needed
        id: check-changes
        run: |
          echo "Checking for changes that affect wheel content..."

          # Get list of changed files (comparing with previous commit)
          if [[ "${{ needs.classify-changes.outputs.needs_wheels }}" == "true" ]]; then
            echo "Classifier requires wheel build for ${{ needs.classify-changes.outputs.release_kind }} release"
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "workflow_dispatch — build wheels"
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if commit message forces build
          if [[ "${{ github.event.head_commit.message }}" == *"[build wheels]"* ]]; then
            echo "Commit message contains [build wheels] - forcing rebuild"
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get changed files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD || echo "")
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Check if any relevant files changed
          if echo "$CHANGED_FILES" | grep -qE '^packages/kindling/|^packages/kindling_sdk/|^packages/kindling_cli/|^build-configs/|^scripts/build_platform_wheels\.sh|^scripts/build\.py|^pyproject\.toml'; then
            echo "✅ Found changes that affect wheel content"
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️  No changes affect wheel content (docs/tests only)"
            echo "needs_rebuild=false" >> $GITHUB_OUTPUT
          fi

      - name: Build platform-specific wheels
        if: steps.check-changes.outputs.needs_rebuild == 'true'
        run: |
          chmod +x scripts/build_platform_wheels.sh
          bash scripts/build_platform_wheels.sh

      - name: List built wheels
        if: steps.check-changes.outputs.needs_rebuild == 'true'
        run: |
          echo "📦 Built wheels:"
          ls -lh dist/

      - name: Smoke test SDK and CLI wheels
        if: steps.check-changes.outputs.needs_rebuild == 'true'
        run: |
          python -m venv /tmp/kindling-wheel-smoke
          /tmp/kindling-wheel-smoke/bin/python -m pip install --upgrade pip
          # Post-rename wheel names are spark_kindling_*-*.whl; fall back to
          # the legacy kindling_*-*.whl globs so a cross-branch rebase works.
          shopt -s nullglob
          SDK_WHEELS=(dist/spark_kindling_sdk-*.whl dist/kindling_sdk-*.whl)
          CLI_WHEELS=(dist/spark_kindling_cli-*.whl dist/kindling_cli-*.whl)
          SDK_WHEEL="${SDK_WHEELS[0]:-}"
          CLI_WHEEL="${CLI_WHEELS[0]:-}"
          if [ -z "$SDK_WHEEL" ]; then
            echo "❌ Could not find SDK wheel in dist/ (expected dist/spark_kindling_sdk-*.whl or dist/kindling_sdk-*.whl)"
            echo "Contents of dist/:"
            ls -lh dist/ || true
            exit 1
          fi
          if [ -z "$CLI_WHEEL" ]; then
            echo "❌ Could not find CLI wheel in dist/ (expected dist/spark_kindling_cli-*.whl or dist/kindling_cli-*.whl)"
            echo "Contents of dist/:"
            ls -lh dist/ || true
            exit 1
          fi
          /tmp/kindling-wheel-smoke/bin/python -m pip install "$SDK_WHEEL" "$CLI_WHEEL"
          /tmp/kindling-wheel-smoke/bin/kindling --help > /tmp/kindling-help.txt
          /tmp/kindling-wheel-smoke/bin/python - <<'PY'
          from kindling_sdk.platform_api import list_supported_platforms
          platforms = list_supported_platforms()
          print("SDK platforms:", platforms)
          assert platforms == ["databricks", "fabric", "synapse"]
          PY

      - name: Skip message
        if: steps.check-changes.outputs.needs_rebuild == 'false'
        run: |
          echo "⏭️  Skipping wheel build - no relevant changes detected"
          echo "To force a rebuild, include [build wheels] in commit message"

      - name: Stage bootstrap script
        if: steps.check-changes.outputs.needs_rebuild == 'true'
        run: cp runtime/scripts/kindling_bootstrap.py dist/kindling_bootstrap.py

      - name: Upload wheel artifacts
        if: steps.check-changes.outputs.needs_rebuild == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: platform-wheels
          path: dist/

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      [
        classify-changes,
        build-wheels,
        unit-tests,
        lint-and-format,
        integration-tests,
        security-scan,
        system-tests,
      ]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.unit-tests.result == 'success' &&
      needs.lint-and-format.result == 'success' &&
      needs.integration-tests.result == 'success' &&
      needs.security-scan.result == 'success' &&
      (
        (needs.classify-changes.outputs.needs_wheels == 'true' && needs.build-wheels.result == 'success') ||
        (needs.classify-changes.outputs.needs_wheels == 'false' && needs.build-wheels.result == 'skipped')
      ) &&
      (
        (needs.classify-changes.outputs.needs_system_tests == 'true' && needs.system-tests.result == 'success') ||
        (needs.classify-changes.outputs.needs_system_tests == 'false' && needs.system-tests.result == 'skipped')
      )
    permissions:
      contents: write

    steps:
      - name: Download wheel artifacts
        if: needs.classify-changes.outputs.needs_wheels == 'true'
        uses: actions/download-artifact@v8
        with:
          name: platform-wheels
          path: dist/

      - name: Create stable release alias assets
        if: needs.classify-changes.outputs.needs_wheels == 'true'
        run: |
          set -euo pipefail
          RUNTIME_WHEEL=$(ls dist/spark_kindling-*.whl 2>/dev/null | head -1)
          if [ -z "$RUNTIME_WHEEL" ]; then
            echo "❌ Could not find runtime wheel in dist/"
            ls -lh dist/ || true
            exit 1
          fi

          RUNTIME_WHEEL_NAME=$(basename "$RUNTIME_WHEEL")
          RELEASE_TAG="${{ github.ref_name }}"
          printf '%s\n' \
            "https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/${RUNTIME_WHEEL_NAME}" \
            > dist/spark_kindling-current-url.txt

          printf '%s\n%s\n' \
            "CURRENT_RUNTIME_URL=\$(curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/spark_kindling-current-url.txt)" \
            'pip install "spark-kindling[standalone] @ ${CURRENT_RUNTIME_URL}"' \
            > dist/spark_kindling-current-install.txt

      - name: Create release and attach wheels
        if: needs.classify-changes.outputs.needs_wheels == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/kindling_bootstrap.py
            dist/spark_kindling-current-url.txt
            dist/spark_kindling-current-install.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release notes only
        if: needs.classify-changes.outputs.needs_wheels == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release summary
        run: |
          echo "# 📦 Release ${{ github.ref_name }} Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Release kind: \`${{ needs.classify-changes.outputs.release_kind }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.classify-changes.outputs.needs_wheels }}" = "true" ]; then
            echo "The following assets are attached to the release:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Package | File |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
            for asset in dist/*; do
              filename=$(basename "$asset")
              size=$(du -h "$asset" | cut -f1)
              echo "| ${filename%.*} | $filename ($size) |" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "No wheel assets were attached for this docs-only release." >> $GITHUB_STEP_SUMMARY
          fi

  build-devcontainer-image:
    name: Build & Publish Devcontainer Image
    runs-on: ubuntu-latest
    needs: [classify-changes, publish-release]
    # Publish on runtime version tags (after release), or when manually triggered with publish_devcontainer=true.
    if: |
      always() && (
        (
          startsWith(github.ref, 'refs/tags/v') &&
          needs.publish-release.result == 'success' &&
          needs.classify-changes.outputs.release_kind == 'runtime'
        ) ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_devcontainer == true)
      )
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version label
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build and push devcontainer image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/Dockerfile.devcontainer
          push: true
          build-args: |
            KINDLING_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/devcontainer:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/devcontainer:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/devcontainer:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/devcontainer:buildcache,mode=max

      - name: Summarize
        run: |
          echo "## Devcontainer Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`${{ env.REGISTRY }}/${{ github.repository }}/devcontainer:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs:
      [
        unit-tests,
        integration-tests,
        kda-packaging-tests,
        system-tests,
        security-scan,
      ]
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v8
        with:
          path: ci-artifacts/

      - name: Generate test summary
        run: |
          echo "# 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY

          # Check unit tests
          if [ "${{ needs.unit-tests.result }}" == "success" ]; then
            echo "| Unit Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Unit Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Check integration tests
          if [ "${{ needs.integration-tests.result }}" == "success" ]; then
            echo "| Integration Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.integration-tests.result }}" == "skipped" ]; then
            echo "| Integration Tests | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Integration Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Check KDA tests
          if [ "${{ needs.kda-packaging-tests.result }}" == "success" ]; then
            echo "| KDA Packaging Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| KDA Packaging Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Check system tests
          if [ "${{ needs.system-tests.result }}" == "success" ]; then
            echo "| System Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.system-tests.result }}" == "skipped" ]; then
            echo "| System Tests | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| System Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Check security scan
          if [ "${{ needs.security-scan.result }}" == "success" ]; then
            echo "| Security Scan | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Security Scan | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
