# Streaming Pipes Test App Configuration

kindling:
  version: "0.4.2"

  # Delta table access mode (storage path writes or catalog table writes)
  delta:
    access_mode: "storage"

  # Logging configuration
  telemetry:
    logging:
      level: INFO

  # Base checkpoint path for streaming queries (set dynamically in code)
  # base_checkpoint_path: "Files/checkpoints/streaming_pipes_test"

  # Framework extensions (if needed)
  bootstrap:
    required_packages: []
