# Local development overlay — ABFSS paths resolved from environment variables.
#
# Required env vars for integration tests:
#   ABFSS_STORAGE_ACCOUNT   storage account name (e.g. myaccount)
#   ABFSS_STORAGE_KEY        storage account key (used by Spark fs.azure config)
#   ABFSS_CONTAINER          container name (e.g. kindling-dev)
#   ABFSS_BRONZE_ORDERS_PATH full abfss:// path for bronze.orders table
#   ABFSS_SILVER_ORDERS_PATH full abfss:// path for silver.orders table
#
# Example values:
#   ABFSS_BRONZE_ORDERS_PATH=abfss://kindling-dev@myaccount.dfs.core.windows.net/bronze/orders
#   ABFSS_SILVER_ORDERS_PATH=abfss://kindling-dev@myaccount.dfs.core.windows.net/silver/orders

entity_tags:
  bronze.orders:
    provider.path: "@secret:ABFSS_BRONZE_ORDERS_PATH"
  silver.orders:
    provider.path: "@secret:ABFSS_SILVER_ORDERS_PATH"
