# Local development overlay — ABFSS paths resolved from environment variables.
#
# Required env vars for this example config:
#   ABFSS_BRONZE_ORDERS_PATH  full abfss:// path for bronze.orders table
#   ABFSS_SILVER_ORDERS_PATH  full abfss:// path for silver.orders table
#
# These values are referenced by the entity tags below. To build the paths,
# use your project's Azure storage account and container (e.g.
# abfss://kindling-dev@myaccount.dfs.core.windows.net/bronze/orders).
# Azure credentials (AZURE_STORAGE_ACCOUNT + service principal vars) are
# configured separately in the test fixtures (see tests/conftest.py).
#

entity_tags:
  bronze.orders:
    provider.path: "@secret:ABFSS_BRONZE_ORDERS_PATH"
  silver.orders:
    provider.path: "@secret:ABFSS_SILVER_ORDERS_PATH"
